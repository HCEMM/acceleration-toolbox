name: Group 5 CI

on:
  push:
    branches:
      - group5
  pull_request:
    branches:
      - group5

jobs:

  multiqc:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup environment (cached)
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: 01_GitHub/environment.yml
          cache-environment: true
          cache-downloads: true

      - name: Run MultiQC
        shell: micromamba-shell {0}
        run: bash 01_GitHub/scripts/05-build-report.sh 01_GitHub/ci_input test_output 01_GitHub/data/multiqc_config.yaml